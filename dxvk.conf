#
# Supported values: True, False

# d3d11.forceComputeUavBarriers = False


# Relaxed pipeline barriers around UAV writes.
#
# When enabled, DXVK will use more relaxed pipeline barriers
# around UAV writes. This may improve performance in some cases,
# but may cause rendering issues in others.
#
# Supported values: True, False

# d3d11.relaxedBarriers = False


# Relaxed UAV pipeline barriers in graphics shaders.
#
# Same as d3d11.relaxedBarriers, but only affects graphics shaders.
#
# Supported values: True, False

# d3d11.relaxedGraphicsBarriers = False


# Override maximum tessellation factor.
#
# When set to a non-zero value, this overrides the maximum
