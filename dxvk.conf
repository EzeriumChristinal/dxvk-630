# ======================================================================
# DXVK Maximum Performance Configuration
# Tuned for Intel UHD 630 (Gen9.5) Integrated GPU
# UMA / shared system memory architecture
# ======================================================================


# --- Async Pipeline Compilation (Gen9 profile) ---
# Hides shader compile stutter on slow iGPU.
dxvk.enableDyasync = True
dxvk.numDyasyncThreads = 2

# --- UMA Memory Tuning ---
# Raw SSBO wastes perf on UMA; limit budget to prevent OOM.
dxvk.useRawSsbo = False
dxvk.maxMemoryBudget = 1024
dxvk.enableMemoryDefrag = False

# --- Presentation: disable vsync, allow exclusive fullscreen ---
dxvk.tearFree = False
dxvk.allowFse = True
dxgi.syncInterval = 0

# --- Pipeline tracking: only needed for 32-bit ---
dxvk.trackPipelineLifetime = False

# --- D3D11 perf ---
# Relaxed barriers reduce driver overhead from redundant barriers.
d3d11.relaxedBarriers = True
d3d11.relaxedGraphicsBarriers = True
# Disable MSAA entirely -- huge gain on iGPU (comment out if app needs AA).
d3d11.disableMsaa = True
# Cap anisotropic filtering + positive LOD bias = less texture bandwidth.
d3d11.samplerAnisotropy = 1
d3d11.samplerLodBias = 1.0
# Cap tessellation -- Gen9 chokes on high tess factors.
d3d11.maxTessFactor = 8

# --- D3D9 perf ---
d3d9.presentInterval = 0
d3d9.samplerAnisotropy = 1
d3d9.samplerLodBias = 1.0
d3d9.maxFrameLatency = 1

# --- DXGI memory reports ---
# Speak the truth about UMA so apps don't over-allocate.
dxgi.maxDeviceMemory = 512
dxgi.maxSharedMemory = 7168


# ======================================================================
# Reference: all built-in options (commented out with defaults)
# Below this point is the standard template for documentation only.
# ======================================================================

# Device filter. Only exposes devices whose Vulkan device name contains
# the given string. May be useful to force an application to run on a
# specific GPU, but not applications launched by that application.

# dxvk.deviceFilter = ""


# Expose the HDR10 ColorSpace (DXGI_COLOR_SPACE_RGB_FULL_G2084_NONE_P2020)
# to the application by default.
# This shows to the game that the global Windows 'HDR Mode' is enabled.
# Many (broken) games will need this to be set to consider exposing HDR output
# as determine it based on the DXGIOutput's current ColorSpace instead of
# using CheckColorSpaceSupport.
# This defaults to the value of the DXVK_HDR environment variable.
#
# Supported values: True, False

# dxgi.enableHDR = True


# Force HDR even when UE4 workaround would disable it.
#
# UE4 games in D3D11 mode may have their HDR output disabled
# to work around a crash with AGS. When this option is enabled,
# the workaround is bypassed and HDR will remain enabled.
#
# Supported values: True, False

# dxgi.forceHdr = False


# Expose support for dcomp swap chains with a dummy window.
#
# This is not a valid implementation of DirectComposition swapchains,
# however some games may rely on this functionality to be present while
# others may require swap chain creation to fail.
#
# Supported values: True, False

# dxgi.enableDummyCompositionSwapchain = False


# Expose Unreal Engine 4 HDR workarounds.
#
# This will enable additional workarounds for Unreal Engine 4 (and 5)
# applications to allow them to display HDR correctly.
#
# Supported values: True, False

# dxgi.enableUe4Workarounds = False


# Override PCI vendor ID.
#
# Supported values: 4-digit hex string

# dxgi.customVendorId = ""


# Override PCI device ID.
#
# Supported values: 4-digit hex string

# dxgi.customDeviceId = ""


# Override device description string.
#
# This may be used by applications to identify specific GPUs.

# dxgi.customDeviceDesc = ""


# Override maximum device memory.
#
# When set to a non-zero value, overrides the amount of device memory
# reported to the application.
#
# Supported values: Positive integer (MiB), 0 to disable

# dxgi.maxDeviceMemory = 0


# Override maximum shared system memory.
#
# When set to a non-zero value, overrides the amount of shared system
# memory reported to the application.
#
# Supported values: Positive integer (MiB), 0 to disable

# dxgi.maxSharedMemory = 0


# Hide Nvidia GPUs from the application.
#
# If an Nvidia GPU is present this option will cause the Nvidia
# GPU(s) to be reported as AMD GPUs.
#
# Supported values: Auto, True, False

# dxgi.hideNvidiaGpu = Auto


# Hide Nvidia GPUs on NVK from the application.
#
# If an Nvidia GPU running the NVK driver is present this option
# will cause the Nvidia GPU(s) to be reported as AMD GPUs.
#
# Supported values: Auto, True, False

# dxgi.hideNvkGpu = Auto


# Hide AMD GPUs from the application.
#
# If an AMD GPU is present this option will cause the AMD
# GPU(s) to be reported as Nvidia GPUs.
#
# Supported values: Auto, True, False

# dxgi.hideAmdGpu = Auto


# Hide Intel GPUs from the application.
#
# If an Intel GPU is present this option will cause the Intel
# GPU(s) to be reported as AMD GPUs.
#
# Supported values: Auto, True, False

# dxgi.hideIntelGpu = Auto


# Defer Vulkan surface creation until first Present call.
#
# This can work around issues where the Vulkan surface is
# incompatible with the application's window.
#
# Supported values: True, False

# dxgi.deferSurfaceCreation = False


# Set maximum frame latency.
#
# When set to a non-zero value, this overrides the maximum
# number of frames that can be queued for presentation, which
# may reduce stuttering in rendering.
#
# Supported values: Positive integer, 0 to disable

# dxgi.maxFrameLatency = 0


# Frame rate limiter. The default value of 0 means that the
# display refresh rate will be used when vsync is enabled, and
# the frame rate will be unlimited when vsync is disabled.
# A positive value sets a fixed frame rate limit, negative
# values set a soft limit (i.e. the limiter will be applied
# but with less strict timing), and -1 will forcibly disable
# the frame rate limiter.
#
# Supported values: Integer (FPS), 0 to default
#
# Note: dxgi.maxFrameRate and d3d9.maxFrameRate are aliases.

# dxvk.maxFrameRate = 0


# Override synchronization interval (vsync).
#
# Supported values:
# -1  No effect (application decides)
#  0  Disable vsync
#  n  Vsync interval (1 = every vertical blank, 2 = every other, etc.)
#
# Note: d3d9.presentInterval is the same for D3D9.

# dxgi.syncInterval = -1


# Tear-free presentation.
#
# When vsync is disabled, using the MAILBOX present mode instead of
# IMMEDIATE will prevent screen tearing at the cost of some overhead.
#
# Supported values: Auto, True, False

# dxvk.tearFree = Auto


# Enable exclusive fullscreen mode.
#
# When this option is enabled, DXVK will allow the game to use
# exclusive fullscreen mode on Windows, which may reduce input
# latency at the cost of making alt-tabbing slower.

# dxvk.allowFse = False


# Latency sleep (Nvidia Reflex).
#
# When enabled, DXVK will attempt to implement Nvidia Reflex-like
# functionality to reduce input latency by limiting the number of
# CPU frames in flight to exactly 1, and then sleeping the CPU
# for the estimated remaining time before the next vblank.
#
# Supported values: Auto, True, False

# dxvk.latencySleep = Auto


# Latency tolerance in microseconds.
#
# The latency sleep heuristic will allow the application to run
# ahead by at most this amount of time. The default should generally
# be fine, but can be reduced for less input latency or increased
# for better GPU utilization in GPU-limited scenarios.
#
# Supported values: Positive integer (microseconds)

# dxvk.latencyTolerance = 1000


# Disable Nvidia Reflex (VK_NV_low_latency2).
#
# Supported values: Auto, True, False

# dxvk.disableNvLowLatency2 = Auto


# Enable debug utils.
#
# Not intended for production use. This will add some overhead.
#
# Supported values: True, False

# dxvk.enableDebugUtils = False


# Enable memory defragmentation.
#
# When enabled, DXVK will attempt to defragment device memory.
# This may improve performance in some cases, but may be broken
# on some drivers.
#
# Supported values: Auto, True, False

# dxvk.enableMemoryDefrag = Auto


# Number of compiler threads.
#
# DXVK may compile pipelines in the background on separate
# threads. This controls how many such threads are used.
# When set to 0, no threading is used.
#
# Supported values: Non-negative integer

# dxvk.numCompilerThreads = 0


# Enable VK_EXT_graphics_pipeline_library.
#
# Allows DXVK to use graphics pipeline libraries, which can
# significantly reduce pipeline compile time. When set to Auto,
# GPL will be enabled, and pipelines will also be compiled in
# the background on a worker thread. When set to True, GPL will
# be used, but pipelines will not be compiled in the background.
# When set to False, GPL will not be used.
#
# Supported values: Auto, True, False

# dxvk.enableGraphicsPipelineLibrary = Auto


# Enable VK_EXT_descriptor_heap.
#
# This extension allows DXVK to allocate descriptor sets directly
# from a heap instead of using individual descriptor pools. This
# can reduce descriptor allocation overhead.
#
# Supported values: Auto, True, False

# dxvk.enableDescriptorHeap = Auto


# Enable VK_EXT_descriptor_buffer.
#
# This extension allows DXVK to use descriptor buffers for binding
# descriptors to shaders. Some games require this to be enabled,
# but this may cause issues on certain hardware or drivers.
#
# Supported values: Auto, True, False

# dxvk.enableDescriptorBuffer = Auto


# Enable descriptor update templates.
#
# Supported values: True, False

# dxvk.enableDescriptorUpdateTemplates = True


# Enable VK_KHR_unified_image_layouts.
#
# This extension simplifies image layout management.
#
# Supported values: True, False

# dxvk.enableUnifiedImageLayouts = True


# Enable implicit SAMPLE_ZERO resolves.
#
# When the application uses SAMPLE_ZERO to resolve MSAA textures,
# and the Vulkan driver supports VK_KHR_fragment_shader_barycentric,
# DXVK will implement implicit resolves for these accesses.
#
# Supported values: True, False

# dxvk.enableImplicitResolves = True


# Enable VK_NV_raw_access_chains.
#
# May improve performance on Nvidia hardware.
#
# Supported values: True, False

# dxvk.enableNvRawAccessChains = True


# Pipeline lifetime tracking.
#
# When enabled, pipelines will be reference counted on the GPU
# timeline to prevent them from being destroyed while still
# in use. This is required on 32-bit applications although
# enabling it on 64-bit may improve stability in some cases.
#
# Supported values: Auto, True, False

# dxvk.trackPipelineLifetime = Auto


# Use storage buffers for raw/structured buffer views.
#
# When set to Auto, DXVK will use storage buffers on devices
# that only support limited SSBO range.
#
# Supported values: Auto, True, False

# dxvk.useRawSsbo = Auto


# HUD elements.
#
# See the DXVK_HUD environment variable documentation for a
# list of supported elements. Multiple elements can be enabled
# by separating them with commas.
#
# Supported values: Comma-separated list of elements

# dxvk.hud = ""


# Override device filter.
#
# See dxvk.deviceFilter documentation.

# dxvk.deviceFilter = ""


# Force enable or disable the custom sine/cosine approximation.
#
# Supported values: Auto, True, False

# dxvk.lowerSinCos = Auto


# Force enable or disable tiler optimizations.
