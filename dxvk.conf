# dxvk.tilerMode = Auto


# Override maximum device memory budget.
#
# When set to a non-zero value, this overrides the maximum amount
# of device memory allocations allowed by DXVK. This can reduce
# memory pressure on systems with small amounts of VRAM.
#
# Supported values: Positive integer (MiB), 0 to disable

# dxvk.maxMemoryBudget = 0


# Force compute LDS barriers in D3D11.
